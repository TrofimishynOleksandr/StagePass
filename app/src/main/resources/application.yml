spring:
  application:
    name: stagepass

  datasource:
    url: jdbc:postgresql://localhost:5432/stagepass
    username: ${DB_USERNAME:stagepass}
    password: ${DB_PASSWORD:stagepass}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  flyway:
    enabled: true
    locations:
      - classpath:db/migration/events
      - classpath:db/migration/booking
      - classpath:db/migration/venue
      - classpath:db/migration/ticket

booking:
  reservation-ttl-minutes: 1