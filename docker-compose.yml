services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: stagepass
      POSTGRES_USER: stagepass
      POSTGRES_PASSWORD: stagepass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_USERNAME: stagepass
      DB_PASSWORD: stagepass
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/stagepass
    depends_on:
      - db
      - redis

volumes:
  postgres_data: